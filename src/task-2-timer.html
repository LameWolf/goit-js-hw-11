<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown TImer</title>
  </head>
  <body>
    <button class="return-button" type="button">
      <a class="return-button__text" href="index.html">Go back ;)</a>
    </button>
    <div class="input-container">
      <input type="date" id="date-selector" />
      <button class="start-countdown" type="button" data-start-countdown>Start countdown</button>
    </div>
    <div class="timer" id="timer">
      <div class="field">
        <span class="value" data-days>00</span>
        <span class="label">Days</span>
      </div>
      <div class="field">
        <span class="value" data-hours>00</span> <span class="label">Hours</span>
      </div>
      <div class="field">
        <span class="value" data-minutes>00</span>
        <span class="label">Minutes</span>
      </div>
      <div class="field">
        <span class="value" data-seconds>00</span>
        <span class="label">Seconds</span>
      </div>
    </div>
  </body>
  <script src="./js/task-2-timer.js"></script>
</html>
